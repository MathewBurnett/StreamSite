worker_processes 1;

events {
    worker_connections 1024;
}

# Single-container setup: this one nginx serves the website, the HLS playlist,
# and accepts the RTMP publish — all from the same origin.

error_log stderr warn;

http {
    include             mime.types;
    default_type        application/octet-stream;
    sendfile            on;
    keepalive_timeout   65;
    access_log          /dev/stdout;

    server {
        listen          80;
        listen          8080;
        server_name     localhost;

        # --- Website (index.html and its assets) ---
        # Unknown paths (e.g. /<stream_key>) fall back to index.html, which
        # reads the stream key from the URL. Real asset files are still served
        # directly. The /hls, /stat, /control, /on_publish locations below take
        # precedence, so those names can't be used as stream keys.
        location / {
            root  /opt/nginx/html;
            try_files $uri $uri/ /index.html;
        }

        # --- HLS stream (fragments written by the rtmp block below) ---
        location /hls {
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2ts ts;
            }
            root /tmp;
            add_header  Cache-Control no-cache;
            add_header  Access-Control-Allow-Origin *;
        }

        # RTMP publish auth hook (loopback only, inside the container).
        location /on_publish {
            return  201;
        }

        # RTMP statistics page.
        location /stat {
            rtmp_stat all;
            rtmp_stat_stylesheet stat.xsl;
        }
        location /stat.xsl {
            alias /opt/nginx/conf/stat.xsl;
        }
        location /control {
            rtmp_control all;
        }

        error_page  500 502 503 504 /50x.html;
        location = /50x.html {
            root html;
        }
    }
}

rtmp {
    server {
        listen 1935;
        chunk_size 4096;

        # Empty application name => publishers target the host directly, with
        # no "live" (or other) path segment:
        #   OBS:    Server "rtmp://<host>:1935"   Stream Key "<key>"
        #   ffmpeg: rtmp://<host>:1935//<key>     (empty app, then the key)
        # The stream key becomes the HLS name, served at /hls/<key>.m3u8.
        application "" {
            live on;
            record off;
            # Loopback callback inside the container — use 127.0.0.1, not the
            # "localhost" the upstream image defaults to.
            on_publish http://127.0.0.1:8080/on_publish;

            hls on;
            hls_path /tmp/hls;
            hls_fragment    1;
            hls_playlist_length     20;
        }
    }
}

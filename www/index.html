<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Stream Site</title>
  <!-- Assets resolve from the site root so the page works when served at
       /<stream_key> (any path depth), not just at /. -->
  <base href="/">

  <script>
    // ---- Stream configuration (fallback defaults) ----
    // These are overridden at load time by variables.conf if it is present.
    // Matches the bundled nginx-rtmp server (this same container):
    //   push to:  rtmp://<this-host>:1935  with stream key <streamKey>
    //   play via: /hls/<streamKey>.m3u8  (served from the same origin)
    //
    // Leave hlsHost empty to play HLS from the same origin that served this
    // page (the single-container setup). Set it to a host/port only if the
    // stream is served by a separate machine.
    var title      = "Stream Site";
    var hlsHost    = "";           // empty => same origin as this page
    var hlsPort    = "8080";       // only used when hlsHost is set
    var streamKey  = "live";       // stream key you publish to /live
    var picture    = "stream.png"; // poster shown before play
  </script>

  <style>
  #instructions { max-width: 1280px; text-align: left; margin: 30px auto; position: relative; }
  #instructions textarea { width: 100%; height: 100px; }

  /* "Stream offline" overlay shown when nothing is being published */
  #offline {
    position: absolute;
    inset: 0;
    display: none; /* toggled to flex by JS */
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(0, 0, 0, 0.75);
    color: #eee;
    font-size: 20px;
    text-align: center;
    z-index: 2;
    pointer-events: none;
  }
  #offline .spinner {
    width: 40px;
    height: 40px;
    margin-bottom: 16px;
    border: 4px solid rgba(255, 255, 255, 0.25);
    border-top-color: #76DAFF;
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Show the controls (hidden at the start by default) */
  .video-js .vjs-control-bar {
    display: -webkit-box;
    display: -webkit-flex;
    display: -ms-flexbox;
    display: flex;
  }

  /* Make the demo a little prettier */
  body {
    margin-top: 20px;
    text-align: center;
    color: #aaa;
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    background: #000;
  }

  a, a:hover, a:visited { color: #76DAFF; }

  /* Info box under the video */
  #info-box {
    max-width: 1280px;
    margin: 20px auto 40px;
    padding: 20px 24px;
    background: #111;
    border: 1px solid #222;
    border-radius: 10px;
    text-align: center;
  }
  #info-box .logo { max-height: 64px; width: auto; margin-bottom: 12px; }
  #info-box p { margin: 6px 0; line-height: 1.5; color: #ccc; }
  #unmute-btn {
    margin-top: 14px;
    padding: 8px 18px;
    font-size: 14px;
    color: #000;
    background: #cd76ff;
    border: none;
    border-radius: 6px;
    cursor: pointer;
  }
  #unmute-btn:hover { background: #5fc7ef; }
  </style>

  <link href="video-js.min.css" rel="stylesheet" type="text/css">
  <link href="player.css" rel="stylesheet" type="text/css">
  <script src="video.min.js"></script>
</head>
<body>
<div id="instructions">
  <video id="myPlayer" class="video-js vjs-default-skin"
        poster="stream.png"
        controls autoplay muted preload="auto" width="1280" height="720"
        data-setup='{ "aspectRatio":"16:9", "liveui": true, "autoplay": "muted", "muted": true }'>
    <p class="vjs-no-js">To view this video please enable JavaScript, and consider upgrading to a web browser that <a href="https://videojs.com/html5-video-support/" target="_blank">supports HTML5 video</a></p>
  </video>
  <div id="offline">
    <div class="spinner"></div>
    <div>Stream is offline &mdash; waiting for it to start&hellip;</div>
  </div>
</div>

<div id="info-box">
  <img class="logo" src="logo.png" alt="Logo" onerror="this.style.display='none'">
  <p><strong>The stream starts muted.</strong></p>
  <p>Use the volume control in the player &mdash; or the button below &mdash; to turn on sound.</p>
  <button id="unmute-btn" type="button">&#128266; Unmute</button>
</div>

</body>
</html>
<script>
  document.title = title;

  // Build the HLS playlist URL. With an empty host we stay on the same origin
  // as this page (single-container setup); otherwise we target host:port.
  function buildHlsUrl(host, port, key) {
    if (!host) return "/hls/" + key + ".m3u8";
    return "http://" + host + ":" + port + "/hls/" + key + ".m3u8";
  }

  // A stream key can be selected by the URL path, e.g. /<stream_key>. The first
  // path segment wins, unless it's empty (the root) or looks like a real file
  // (has a dot, e.g. /index.html) or contains unsafe characters.
  function streamKeyFromPath() {
    var seg = location.pathname.replace(/^\/+|\/+$/g, "").split("/")[0];
    seg = decodeURIComponent(seg || "");
    if (!seg || !/^[A-Za-z0-9_-]+$/.test(seg)) return "";
    return seg;
  }

  var hlsUrl = buildHlsUrl(hlsHost, hlsPort, streamKey);

  var player = videojs("myPlayer");
  player.poster(picture);

  var hlsSource  = { src: hlsUrl, type: "application/x-mpegURL" };
  var offlineEl  = document.getElementById("offline");
  var POLL_MS    = 3000;   // how often to check the stream
  var STALE_MS   = 12000;  // playlist unchanged this long => treat as offline
  var MAX_AGE_MS = 30000;  // playlist file older than this => treat as offline

  var live         = false; // is a stream currently loaded/playing?
  var lastPlaylist = "";    // last seen .m3u8 body
  var lastChange   = 0;     // when the playlist last changed

  function showOffline() {
    if (live) { player.reset(); }   // stop & clear a stream that has ended
    live = false;
    player.poster(picture);
    offlineEl.style.display = "flex";
  }

  function goLive() {
    if (live) return;               // already playing
    live = true;
    offlineEl.style.display = "none";
    player.src(hlsSource);
    player.muted(true);             // muted so the browser allows autoplay
    var attempt = player.play();
    if (attempt && typeof attempt.catch === "function") {
      attempt.catch(function () { /* autoplay blocked; user can press play */ });
    }
  }

  // Poll the HLS playlist. It only goes live when the playlist actually
  // advances (new fragments), so a stopped-but-not-yet-removed playlist is
  // correctly detected as offline once it stops changing.
  function checkStream() {
    var ageMs = 0;
    fetch(hlsUrl + "?_=" + Date.now(), { cache: "no-store" })
      .then(function (res) {
        if (!res.ok) throw new Error("offline");
        var lm = res.headers.get("Last-Modified");
        if (lm) { ageMs = Date.now() - new Date(lm).getTime(); }
        return res.text();
      })
      .then(function (text) {
        if (text.indexOf("#EXTINF") === -1) { showOffline(); return; }
        // Playlist file hasn't been written recently => stream has stopped.
        if (ageMs > MAX_AGE_MS) { showOffline(); return; }
        if (text !== lastPlaylist) {
          lastPlaylist = text;
          lastChange = Date.now();
          goLive();
        } else if (Date.now() - lastChange > STALE_MS) {
          showOffline();
        }
      })
      .catch(function () { showOffline(); });
  }

  // If the stream drops mid-play, Video.js raises an error; fall back to
  // the waiting state and let polling pick it back up.
  player.on("error", function () {
    player.error(null);
    showOffline();
  });

  // ---- variables.conf is the source of truth; it overrides the inline defaults ----
  function parseConf(text) {
    var cfg = {};
    text.split(/\r?\n/).forEach(function (line) {
      line = line.trim();
      if (!line || line.charAt(0) === "#") return;       // skip blanks/comments
      var eq = line.indexOf("=");
      if (eq === -1) return;
      var key = line.slice(0, eq).trim();
      var val = line.slice(eq + 1).trim().replace(/^["']|["']$/g, ""); // strip quotes
      if (key) cfg[key] = val;
    });
    return cfg;
  }

  function start(cfg) {
    // hlsHost may legitimately be empty (same origin), so only fall back to the
    // default when the key is missing from the config entirely.
    var host       = cfg.hlsHost   === undefined ? hlsHost : cfg.hlsHost;
    var port       = cfg.hlsPort   || hlsPort;
    // The URL path (/<stream_key>) takes precedence over the configured default.
    var pathKey    = streamKeyFromPath();
    var key        = pathKey || cfg.streamKey || streamKey;

    var baseTitle  = cfg.title || title;
    document.title = pathKey ? baseTitle + " — " + pathKey : baseTitle;
    picture        = cfg.picture   || picture;
    hlsUrl    = buildHlsUrl(host, port, key);
    hlsSource = { src: hlsUrl, type: "application/x-mpegURL" };

    player.ready(function () {
      player.poster(picture);
      showOffline();   // start in the waiting state
      checkStream();
      setInterval(checkStream, POLL_MS);
    });
  }

  // Load the config, then start. If it can't be read, fall back to inline defaults.
  fetch("variables.conf?_=" + Date.now(), { cache: "no-store" })
    .then(function (res) { if (!res.ok) throw new Error("no conf"); return res.text(); })
    .then(function (text) { start(parseConf(text)); })
    .catch(function () { start({}); });

  // Unmute button in the info box: toggles sound and stays in sync with the player.
  var unmuteBtn = document.getElementById("unmute-btn");
  function syncUnmuteBtn() {
    unmuteBtn.innerHTML = player.muted() ? "&#128266; Unmute" : "&#128263; Mute";
  }
  unmuteBtn.addEventListener("click", function () {
    player.muted(!player.muted());
  });
  player.on("volumechange", syncUnmuteBtn);
  player.ready(syncUnmuteBtn);
</script>
